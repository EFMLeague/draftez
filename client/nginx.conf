server {
  listen 3000;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # SPA: ogni rotta non-file (es. /:name) ricade su index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache lunga per gli asset con hash generati da Vite.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
