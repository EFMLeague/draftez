# Stack completo: backend (Socket.IO) + frontend (Vite/React).
# Le variabili sono lette automaticamente dal file ".env" in questa cartella.
services:
  server:
    build:
      context: ./server
    environment:
      - PORT=3001
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000}
    ports:
      - "${SERVER_PORT:-3001}:3001"
    restart: unless-stopped

  client:
    build:
      context: ./client
      args:
        # VITE_* va passato a build time (viene inglobato nel bundle).
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-http://localhost:3001}
    ports:
      - "${CLIENT_PORT:-3000}:3000"
    depends_on:
      - server
    restart: unless-stopped
